kind = "web"
previewPath = "/"
title = "Weather & News Hub"
version = "1.0.0"
id = "artifacts/weather-news-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22027

[services.development]
run = "pnpm --filter @workspace/weather-news-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/weather-news-hub", "run", "build" ]
publicDir = "artifacts/weather-news-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22027"
BASE_PATH = "/"
